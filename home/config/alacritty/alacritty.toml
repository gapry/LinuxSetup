[window]
dimensions = { columns = 120, lines = 35 }
padding = { x = 10, y = 10 }
decorations = "Full"
startup_mode = "Windowed"
opacity = 0.95
title = "Alacritty - Dev Station"

[scrolling]
history = 10000
multiplier = 3

[font]
normal = { family = "JetBrains Mono Nerd Font", style = "Regular" }
bold = { family = "JetBrains Mono Nerd Font", style = "Bold" }
italic = { family = "JetBrains Mono Nerd Font", style = "Italic" }
size = 12.0

[colors]
draw_bold_text_with_bright_colors = true

[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 750

[selection]
save_to_clipboard = true

[env]
TERM = "xterm-256color"
COLORTERM = "truecolor"

[shell]
program = "/usr/bin/fish"
args = ["-l", "-c", "zellij"]

[[keyboard.bindings]]
chars = "\u000c"
key = "K"
mods = "Command"
